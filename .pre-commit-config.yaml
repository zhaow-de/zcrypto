repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
    - id: mdformat
      additional_dependencies:
      - mdformat-gfm
      - mdformat-toc
      # Allowlist of mdformat-managed docs: the READMEs + each research REPORT under docs/research/.
      # Append each new research paper here when it lands. Verbatim docs (e.g. the
      # decision log 02.phase1-decisions.md, whose option lists + "Picked (N)" conclusions mdformat
      # would restructure) are intentionally left off so they stay as-is.
      files: |
        (?x)^(
            README\.md|
            docs/open-topics/README\.md|
            docs/research/01\.binance-eea-spot-quant\.md|
            docs/research/02\.phase1-summary\.md|
            docs/research/03\.phase2-orientation\.md|
            docs/research/04\.phase2-stage2-results\.md
        )$
