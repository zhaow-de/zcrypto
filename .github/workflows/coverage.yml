name: Test coverage

on:
  push:
    branches: [develop, main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    services:
      # qlib's DiskExpressionCache/DiskDatasetCache need Redis for their locks;
      # without it the redis-gated experiment integration/e2e tests skip and their
      # coverage is lost. The runner manages this service; tests reach it on
      # localhost:6379 (qlib's default redis host/port).
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Install OpenMP runtime for LightGBM (Qlib dependency)
        run: sudo apt-get update && sudo apt-get install -y libgomp1
      - run: uv run coverage run -m pytest
      - run: uv run coverage lcov -o coverage.lcov
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
