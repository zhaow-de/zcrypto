repository:
  # See https://docs.github.com/en/rest/reference/repos#update-a-repository for all available settings.
  name: zcrypto
  description: Quant trading strategy engineering using Qlib
  homepage: null
  topics: quant, qlib, crypto, ai
  private: false
  security_and_analysis:
    secret_scanning:
      status: enabled
    secret_scanning_push_protection:
      status: enabled
    dependabot_security_updates:
      status: enabled
    secret_scanning_non_provider_patterns:
      status: disabled
    secret_scanning_validity_checks:
      status: disabled
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: false
  has_discussions: false
  is_template: false
  web_commit_signoff_required: false
  default_branch: develop
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# Labels: define labels for Issues and Pull Requests
labels:
  - { name: "bug", color: "#d73a4a", description: "Something isn't working" }
  - { name: "chore", color: "#22ef95", description: "No-/Low-impact change" }
  - { name: "ci", color: "#ace947", description: "Continuous integration" }
  - { name: "dependencies", color: "#0366d6", description: "Pull requests that update a dependency file" }
  - { name: "documentation", color: "#0075ca", description: "Improvements or additions to documentation" }
  - { name: "duplicate", color: "#cfd3d7", description: "This issue or pull request already exists" }
  - { name: "enhancement", color: "#a2eeef", description: "New feature or request" }
  - { name: "feature", color: "#450617", description: "New functionality/capability" }
  - { name: "good first issue", color: "#7057ff", description: "Good for newcomers" }
  - { name: "help wanted", color: "#008672", description: "Extra attention is needed" }
  - { name: "infrastructure", color: "#62ca2e", description: "Infrastructure related" }
  - { name: "invalid", color: "#e4e669", description: "This doesn't seem right" }
  - { name: "pre_commit", color: "#000000", description: "Pull requests that update pre_commit code" }
  - { name: "question", color: "#d876e3", description: "Further information is requested" }
  - { name: "wontfix", color: "#ffffff", description: "This will not be worked on" }

branches:
  - name: main
    # https://docs.github.com/en/rest/reference/repos#update-branch-protection
    # Branch Protection settings. Set to null to disable
    protection:
      # Required. Require at least one approving review on a pull request, before merging. Set to null to disable.
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      # Required. Require status checks to pass before merging. Set to null to disable
      required_status_checks: null
      # Required. Enforce all configured restrictions for administrators. Set to true to enforce required status checks for repository administrators. Set to null to disable.
      enforce_admins: true
      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: false
      # Required. Restrict who can push to this branch. Team and user restrictions are only available for organization-owned repositories. Set to null to disable.
      restrictions: null
  - name: develop
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks: null
      enforce_admins: true
      required_linear_history: false
      allow_force_pushes: true
      allow_deletions: false
      required_conversation_resolution: false
      restrictions: null
